<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Модерация новостей — Тихая гавань</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #f5f0e8; --sand-dark: #e8e0d0; --sea: #4a7c8e; --sea-light: #6a9cae; --sea-pale: #d6e8ed;
      --white: #fdfcfa; --text: #3a3530; --text-light: #6b6560; --ink: #2a2520;
      --green: #3a8a5c; --red: #b84040; --orange: #c47a30; --stone: #8a8278;
    }
    body { font-family: 'Jost', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.5rem; color: var(--ink); margin-bottom: .5rem; }
    .subtitle { font-size: .85rem; color: var(--stone); margin-bottom: 1.5rem; }

    /* Login */
    .login-box {
      background: var(--white); border: 1px solid var(--sand-dark); border-radius: 10px;
      padding: 2rem; max-width: 360px; margin: 4rem auto;
    }
    .login-box h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--ink); }
    .login-box input {
      width: 100%; padding: .6rem .8rem; border: 1.5px solid var(--sand-dark); border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .9rem; margin-bottom: 1rem;
    }
    .login-box button {
      width: 100%; padding: .6rem; background: var(--sea); color: white; border: none;
      border-radius: 6px; font-family: 'Jost', sans-serif; font-size: .9rem; font-weight: 500; cursor: pointer;
    }
    .login-box button:hover { opacity: .9; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid var(--sand-dark); }
    .tab-btn {
      padding: .6rem 1.2rem; background: none; border: none; border-bottom: 2px solid transparent;
      margin-bottom: -2px; font-family: 'Jost', sans-serif; font-size: .9rem; font-weight: 500;
      color: var(--stone); cursor: pointer; transition: all .2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--sea); border-bottom-color: var(--sea); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;
    }
    .toolbar input[type="date"] {
      padding: .4rem .6rem; border: 1.5px solid var(--sand-dark); border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .85rem;
    }
    .btn {
      padding: .45rem .9rem; border: none; border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .8rem; font-weight: 500;
      cursor: pointer; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-green { background: var(--green); color: white; }
    .btn-sea { background: var(--sea); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-orange { background: var(--orange); color: white; }
    .btn-outline { background: transparent; border: 1.5px solid var(--sand-dark); color: var(--text-light); }
    .btn-sm { padding: .25rem .55rem; font-size: .7rem; }
    .stats { font-size: .8rem; color: var(--stone); }

    /* Card */
    .draft-card {
      background: var(--white); border: 1px solid var(--sand-dark); border-radius: 10px;
      padding: 1.25rem; margin-bottom: 1rem; transition: opacity .3s;
    }
    .draft-card.fading { opacity: .3; }
    .draft-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
      margin-bottom: .75rem;
    }
    .draft-headline { font-size: 1.05rem; font-weight: 600; color: var(--ink); line-height: 1.3; }
    .draft-tag {
      padding: .12rem .5rem; border-radius: 10px; font-size: .65rem; font-weight: 500;
      background: var(--sea-pale); color: var(--sea); text-transform: uppercase; white-space: nowrap;
    }
    .draft-summary { font-size: .82rem; color: var(--text-light); line-height: 1.7; margin-bottom: .75rem; }

    .draft-sources { margin-bottom: .75rem; }
    .draft-src {
      display: flex; align-items: flex-start; gap: .5rem;
      padding: .6rem 0; border-bottom: 1px solid var(--sand-dark);
      font-size: .8rem; transition: opacity .3s;
    }
    .draft-src:last-child { border-bottom: none; }
    .draft-src-flag { font-size: .9rem; flex-shrink: 0; width: 24px; text-align: center; padding-top: .1rem; }
    .draft-src-info { flex: 1; }
    .draft-src-name { font-weight: 600; color: var(--text); }
    .draft-src-title { color: var(--text-light); margin-top: .15rem; }
    .draft-src-excerpt { color: var(--stone); font-size: .75rem; margin-top: .25rem; line-height: 1.5; }
    .draft-src-url { font-size: .72rem; color: var(--sea); word-break: break-all; }
    .draft-src-actions { display: flex; gap: .35rem; margin-top: .4rem; }

    .src-hidden .draft-src-info { opacity: .35; text-decoration: line-through; }
    .src-hidden .draft-src-flag { opacity: .35; }
    .draft-src-status {
      display: inline-block; padding: .1rem .4rem; border-radius: 6px; font-size: .6rem;
      font-weight: 500; background: #f8d7da; color: #721c24; margin-left: .4rem;
    }

    .draft-actions {
      display: flex; gap: .5rem; padding-top: .75rem;
      border-top: 1px solid var(--sand-dark);
    }

    .empty-msg { text-align: center; padding: 3rem; color: var(--stone); }

    /* Spinner */
    .spinner-inline {
      display: inline-block; width: 14px; height: 14px; border: 2px solid var(--sand-dark);
      border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: .3rem;
    }
    .replacing-msg {
      text-align: center; padding: 2rem; color: var(--orange); font-size: .9rem;
    }
    .replacing-msg .spinner {
      display: inline-block; width: 18px; height: 18px; border: 2px solid var(--sand-dark);
      border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; padding: .6rem 1.2rem;
      background: var(--ink); color: white; border-radius: 8px; font-size: .85rem;
      display: none; z-index: 999; animation: fadeUp .3s ease;
    }
    .toast.show { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    /* Alert modal */
    .alert-overlay {
      position: fixed; inset: 0; background: rgba(42,37,32,0.5); backdrop-filter: blur(3px);
      z-index: 1000; display: none; align-items: center; justify-content: center; padding: 2rem;
    }
    .alert-overlay.show { display: flex; }
    .alert-box {
      background: var(--white); border-radius: 12px; padding: 2rem; max-width: 420px; width: 100%;
      text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,0.2); animation: alertIn .25s ease;
    }
    @keyframes alertIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
    .alert-icon { font-size: 2.2rem; margin-bottom: .75rem; }
    .alert-text { font-size: .9rem; color: var(--text); line-height: 1.6; margin-bottom: 1.5rem; }
    .alert-ok {
      padding: .55rem 2rem; background: var(--sea); color: white; border: none; border-radius: 8px;
      font-family: 'Jost', sans-serif; font-size: .9rem; font-weight: 500; cursor: pointer;
      transition: opacity .2s;
    }
    .alert-ok:hover { opacity: .85; }

    /* ── Модальные окна добавления темы / источника ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(42,37,32,0.55);
      backdrop-filter: blur(3px); z-index: 1100;
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--white); border-radius: 14px; padding: 2rem;
      max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: alertIn .25s ease;
    }
    .modal-box h3 { margin: 0 0 1.2rem; font-size: 1.1rem; color: var(--ink); }
    .modal-field { margin-bottom: 1rem; }
    .modal-field label {
      display: block; font-size: .8rem; font-weight: 600;
      color: var(--stone); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem;
    }
    .modal-field input, .modal-field textarea, .modal-field select {
      width: 100%; box-sizing: border-box;
      padding: .55rem .75rem; border: 1.5px solid var(--sand-dark); border-radius: 8px;
      font-family: 'Jost', sans-serif; font-size: .9rem; color: var(--ink);
      background: var(--sand); transition: border-color .2s;
    }
    .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus {
      outline: none; border-color: var(--sea);
    }
    .modal-field textarea { resize: vertical; min-height: 80px; }
    .modal-source-block {
      border: 1.5px solid var(--sand-dark); border-radius: 10px;
      padding: 1rem; margin-bottom: .75rem; background: var(--sand);
    }
    .modal-source-block summary {
      cursor: pointer; font-weight: 600; font-size: .9rem; color: var(--ink);
      list-style: none; display: flex; align-items: center; gap: .5rem; user-select: none;
    }
    .modal-source-block summary::-webkit-details-marker { display: none; }
    .modal-source-block summary::before { content: '▸'; color: var(--stone); font-size: .8rem; }
    .modal-source-block[open] summary::before { content: '▾'; }
    .modal-source-inner { margin-top: .75rem; }
    .modal-hint { font-size: .82rem; color: var(--stone); margin: .5rem 0 1rem; line-height: 1.5; }
    .modal-btns { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; flex-wrap: wrap; }
    .btn-cancel {
      padding: .55rem 1.4rem; background: transparent; border: 1.5px solid var(--sand-dark);
      border-radius: 8px; font-family: 'Jost', sans-serif; font-size: .9rem;
      cursor: pointer; color: var(--stone); transition: border-color .2s;
    }
    .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }
    .btn-save {
      padding: .55rem 1.8rem; background: var(--sea); color: white; border: none;
      border-radius: 8px; font-family: 'Jost', sans-serif; font-size: .9rem;
      font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .btn-save:hover { opacity: .85; }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }
    .btn-add-topic {
      padding: .45rem 1rem; background: var(--sea); color: white; border: none;
      border-radius: 6px; font-family: 'Jost', sans-serif; font-size: .8rem;
      font-weight: 500; cursor: pointer; transition: opacity .2s;
    }
    .btn-add-topic:hover { opacity: .85; }
    .btn-add-source {
      padding: .25rem .6rem; background: transparent; border: 1.5px solid var(--sea);
      border-radius: 6px; font-family: 'Jost', sans-serif; font-size: .7rem;
      color: var(--sea); cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-add-source:hover { background: var(--sea); color: white; }
    .order-btns { display: flex; flex-direction: column; gap: .2rem; flex-shrink: 0; margin-left: .25rem; }
    .btn-order {
      width: 28px; height: 28px; border: 1.5px solid var(--sand-dark); border-radius: 6px;
      background: var(--white); font-size: .75rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all .15s; color: var(--stone);
      padding: 0;
    }
    .btn-order:hover { background: var(--sea); border-color: var(--sea); color: white; }
    .btn-order:disabled { opacity: .25; cursor: not-allowed; }
    .draft-card-wrap { display: flex; align-items: flex-start; gap: .5rem; margin-bottom: 1rem; }
    .draft-card-wrap .draft-card { flex: 1; margin-bottom: 0; }
  </style>
</head>
<body>

<div class="container">
  <!-- LOGIN -->
  <div id="login-screen" class="login-box">
    <h2>🔐 Модерация новостей</h2>
    <form id="login-form" onsubmit="event.preventDefault();doLogin();" autocomplete="on">
      <input type="text" name="username" autocomplete="username" value="admin" style="display:none" />
      <input type="password" id="pwd-input" name="password" autocomplete="current-password" placeholder="Пароль" />
      <button type="submit">Войти</button>
    </form>
  </div>

  <!-- ADMIN -->
  <div id="admin-screen" style="display:none">
    <h1>📰 Модерация новостей</h1>
    <div class="subtitle">Черновики собраны в 05:00 UTC. Проверьте и опубликуйте.</div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-drafts" onclick="switchTab('drafts')">📝 Черновики</button>
      <button class="tab-btn" id="tab-published" onclick="switchTab('published')">✅ Опубликованные</button>
    </div>

    <div class="toolbar">
      <div style="display:flex;gap:.5rem;align-items:center">
        <input type="date" id="date-picker" onchange="loadCurrentTab()" />
        <button class="btn btn-sea" onclick="loadCurrentTab()">Загрузить</button>
        <button class="btn btn-orange" id="fetch-btn" onclick="runFetch()">📡 Собрать новости</button>
        <button class="btn-add-topic" onclick="showAddTopicModal()">✏️ Добавить тему</button>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <span class="stats" id="stats-text"></span>
        <button class="btn btn-green" id="publish-all-btn" onclick="publishAll()" style="display:none">✓ Опубликовать все</button>
      </div>
    </div>

    <div id="items-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Alert modal for important messages -->
<div class="alert-overlay" id="alert-overlay" onclick="closeAlert(event)">
  <div class="alert-box">
    <div class="alert-icon" id="alert-icon">⚠️</div>
    <div class="alert-text" id="alert-text"></div>
    <button class="alert-ok" onclick="closeAlert()">Понятно</button>
  </div>
</div>

<script>
var adminPassword = '';
var currentDate = new Date().toISOString().split('T')[0];
var currentTab = 'drafts';
var items = [];

var FLAGS = { west: '🌍', ukraine: '🇺🇦', russia: '🇷🇺', china: '🌏' };
var LABELS = { west: 'Запад', ukraine: 'Украина', russia: 'Россия', china: 'Глобальный Юг' };

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function showAlert(msg, icon) {
  document.getElementById('alert-icon').textContent = icon || '⚠️';
  document.getElementById('alert-text').textContent = msg;
  document.getElementById('alert-overlay').classList.add('show');
}

function closeAlert(e) {
  if (e && e.target && e.target.id !== 'alert-overlay') return;
  document.getElementById('alert-overlay').classList.remove('show');
}

function doLogin() {
  adminPassword = document.getElementById('pwd-input').value;
  if (!adminPassword) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  document.getElementById('date-picker').value = currentDate;
  loadCurrentTab();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-drafts').classList.toggle('active', tab === 'drafts');
  document.getElementById('tab-published').classList.toggle('active', tab === 'published');
  document.getElementById('publish-all-btn').style.display = (tab === 'drafts') ? '' : 'none';
  loadCurrentTab();
}

function loadCurrentTab() {
  currentDate = document.getElementById('date-picker').value || currentDate;
  loadItems(currentTab === 'drafts' ? 'draft' : 'published');
}

async function loadItems(status) {
  var list = document.getElementById('items-list');
  list.innerHTML = '<div class="empty-msg">Загружаем...</div>';

  try {
    var r = await fetch('/api/news?date=' + currentDate + '&status=' + status);
    var data = await r.json();
    items = Array.isArray(data) ? data : [];
  } catch (e) {
    items = [];
  }

  var label = status === 'draft' ? 'Черновиков' : 'Опубликовано';
  document.getElementById('stats-text').textContent = label + ': ' + items.length;

  if (items.length === 0) {
    var emptyMsg = status === 'draft' ? 'Нет черновиков за эту дату' : 'Нет опубликованных тем за эту дату';
    list.innerHTML = '<div class="empty-msg">' + emptyMsg + '</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += renderCard(items[i], status);
  }
  list.innerHTML = html;
}

function renderCard(n, mode) {
  var srcHtml = '';
  var order = ['west', 'ukraine', 'russia', 'china'];
  for (var k = 0; k < order.length; k++) {
    for (var j = 0; j < (n.sources || []).length; j++) {
      var s = n.sources[j];
      if (s.perspective === order[k]) {
        var isHidden = s.hidden === true;
        var rowClass = isHidden ? ' src-hidden' : '';
        var hiddenBadge = isHidden ? '<span class="draft-src-status">скрыт</span>' : '';

        var srcActions = '';
        if (mode === 'published') {
          if (isHidden) {
            srcActions = '<div class="draft-src-actions">' +
              '<button class="btn btn-sm btn-green" onclick="restoreSource(\'' + n.id + '\',\'' + s.perspective + '\')">↩ Вернуть</button>' +
              '</div>';
          } else {
            srcActions = '<div class="draft-src-actions">' +
              '<button class="btn btn-sm btn-outline" onclick="hideSource(\'' + n.id + '\',\'' + s.perspective + '\')">👁 Скрыть</button>' +
              '<button class="btn btn-sm btn-orange" id="srcbtn-' + n.id + '-' + s.perspective + '" onclick="replaceSource(\'' + n.id + '\',\'' + s.perspective + '\')">🔄 Заменить</button>' +
              '</div>';
          }
        }

        srcHtml +=
          '<div class="draft-src' + rowClass + '" id="src-' + n.id + '-' + s.perspective + '">' +
            '<div class="draft-src-flag">' + (FLAGS[s.perspective] || '📰') + '</div>' +
            '<div class="draft-src-info">' +
              '<div class="draft-src-name">' + esc(s.name) + ' <span style="color:var(--stone);font-weight:400">(' + (LABELS[s.perspective] || '') + ')</span>' + hiddenBadge + '</div>' +
              '<div class="draft-src-title">' + esc(s.title) + '</div>' +
              (s.excerpt ? '<div class="draft-src-excerpt">' + esc(s.excerpt).substring(0, 200) + '</div>' : '') +
              '<div class="draft-src-url"><a href="' + esc(s.url) + '" target="_blank">' + esc(s.url).substring(0, 70) + '...</a></div>' +
              srcActions +
            '</div>' +
          '</div>';
        break;
      }
    }
  }

  var addSourceBtn = '<button class="btn-add-source" onclick="showAddSourceModal(\'' + n.id + '\')">🔗 Добавить ссылку</button>';

  var topActions = '';
  if (mode === 'draft') {
    topActions =
      '<button class="btn btn-green" onclick="publishOne(\'' + n.id + '\')">✓ Опубликовать</button>' +
      '<button class="btn btn-red" onclick="deleteOne(\'' + n.id + '\')">✕ Удалить</button>';
  } else {
    var isWar = (n.headline || '').indexOf('Война в Украине') !== -1;
    if (isWar) {
      topActions =
        '<button class="btn btn-orange" id="replace-btn-' + n.id + '" onclick="replaceOne(\'' + n.id + '\')">🔄 Обновить статьи</button>' +
        addSourceBtn;
    } else {
      topActions =
        '<button class="btn btn-outline" onclick="hideOne(\'' + n.id + '\')">👁 Скрыть тему</button>' +
        '<button class="btn btn-orange" id="replace-btn-' + n.id + '" onclick="replaceOne(\'' + n.id + '\')">🔄 Заменить тему</button>' +
        addSourceBtn;
    }
  }

  var orderBtns = '';
  if (mode === 'published') {
    orderBtns =
      '<div class="order-btns">' +
        '<button class="btn-order" title="Поднять" onclick="moveCard(\'' + n.id + '\', -1)">▲</button>' +
        '<button class="btn-order" title="Опустить" onclick="moveCard(\'' + n.id + '\', 1)">▼</button>' +
      '</div>';
    return (
      '<div class="draft-card-wrap" id="wrap-' + n.id + '">' +
        orderBtns +
        '<div class="draft-card" id="card-' + n.id + '">' +
          '<div class="draft-header">' +
            '<div class="draft-headline">' + esc(n.headline) + '</div>' +
            '<span class="draft-tag">' + esc(n.topic_tag) + '</span>' +
          '</div>' +
          '<div class="draft-summary">' + esc(n.summary) + '</div>' +
          '<div class="draft-sources">' + srcHtml + '</div>' +
          '<div class="draft-actions" id="actions-' + n.id + '">' + topActions + '</div>' +
        '</div>' +
      '</div>'
    );
  }

  return (
    '<div class="draft-card" id="card-' + n.id + '">' +
      '<div class="draft-header">' +
        '<div class="draft-headline">' + esc(n.headline) + '</div>' +
        '<span class="draft-tag">' + esc(n.topic_tag) + '</span>' +
      '</div>' +
      '<div class="draft-summary">' + esc(n.summary) + '</div>' +
      '<div class="draft-sources">' + srcHtml + '</div>' +
      '<div class="draft-actions" id="actions-' + n.id + '">' + topActions + '</div>' +
    '</div>'
  );
}

// ── API helper ──

async function adminAction(action, id, extra) {
  try {
    var body = { action: action, password: adminPassword };
    if (id) body.id = id;
    if (extra) { for (var k in extra) body[k] = extra[k]; }
    var r = await fetch('/api/news-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return await r.json();
  } catch (e) {

async function publishOne(id) {
  var res = await adminAction('publish', id);
  if (res && res.ok) {

    toast('Опубликовано ✓');
    setTimeout(loadCurrentTab, 600);
  } else { toast('Ошибка публикации'); }
}

async function deleteOne(id) {
  if (!confirm('Удалить эту тему навсегда?')) return;
  var res = await adminAction('delete', id);
  if (res && res.ok) {
    document.getElementById('card-' + id).remove();
    toast('Удалено');
  }
}

async function runFetch() {
  if (!confirm('Собрать свежие новости?\nВсе текущие темы за сегодня будут УДАЛЕНЫ и заменены новыми.\nЗаймёт 60-90 секунд.')) return;
  var btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span> Собираем...';

  var res = await adminAction('run_fetch');
  btn.disabled = false;
  btn.innerHTML = '📡 Собрать новости';

  if (res && (res.ok || res.published > 0)) {
    var count = res.published || res.claude_items || 0;
    var skippedInfo = '';
    if (res.skipped && res.skipped.length > 0) {
      skippedInfo = '\n\nПропущено: ' + res.skipped.length + ' тем (' + res.skipped.map(function(s){ return s.reason; }).join(', ') + ')';
    }
    showAlert('Собрано и опубликовано: ' + count + ' тем.' + skippedInfo, '✅');
    switchTab('published');
  } else {
    var errMsg = (res && res.error) || 'Ошибка сбора новостей';
    if (res && res.skipped && res.skipped.length > 0) {
      errMsg += '\n\nПропущено: ' + JSON.stringify(res.skipped);
    }
    showAlert(errMsg, '⚠️');
  }
}

async function publishAll() {
  if (!confirm('Опубликовать все черновики за ' + currentDate + '?')) return;
  var res = await adminAction('publish_all', null, { date: currentDate });
  if (res && res.ok) {
    toast('Все опубликованы ✓');
    setTimeout(loadCurrentTab, 500);
  }
}

async function hideOne(id) {
  if (!confirm('Скрыть тему целиком?\nОна исчезнет с сайта.')) return;
  var res = await adminAction('hide', id);
  if (res && res.ok) {
    var card = document.getElementById('card-' + id);
    if (card) card.remove();
    toast('Тема скрыта 👁');
    // Обновим счётчик
    var remaining = document.querySelectorAll('.draft-card').length;
    document.getElementById('stats-text').textContent = 'Опубликовано: ' + remaining;
  } else { showAlert('Ошибка скрытия', '⚠️'); }
}

async function replaceOne(id) {
  // Найдём headline темы
  var card = document.getElementById('card-' + id);
  var headlineEl = card ? card.querySelector('.draft-headline') : null;
  var headline = headlineEl ? headlineEl.textContent : '';
  var isWar = headline.indexOf('Война в Украине') !== -1;

  var msg = isWar
    ? 'Обновить статьи в рубрике «Война в Украине»?\nРубрика останется, статьи будут заменены.\nЗаймёт 30-60 секунд.'
    : 'Скрыть тему и сгенерировать новую?\nЗаймёт 30-60 секунд.';
  if (!confirm(msg)) return;

  var actionsDiv = document.getElementById('actions-' + id);
  var spinnerText = isWar ? 'Обновляем статьи...' : 'Генерируем замену...';
  actionsDiv.innerHTML = '<div class="replacing-msg"><span class="spinner"></span> ' + spinnerText + '</div>';

  var res = await adminAction('replace', id, { date: currentDate });
  if (res && res.ok) {
    showAlert(isWar ? 'Статьи обновлены ✓' : 'Тема заменена ✓', '✅');
    setTimeout(loadCurrentTab, 500);
  } else {
    showAlert((res && res.error) || 'Ошибка замены', '⚠️');
    if (isWar) {
      actionsDiv.innerHTML =
        '<button class="btn btn-orange" onclick="replaceOne(\'' + id + '\')">🔄 Обновить статьи</button>';
    } else {
      actionsDiv.innerHTML =
        '<button class="btn btn-outline" onclick="hideOne(\'' + id + '\')">👁 Скрыть тему</button>' +
        '<button class="btn btn-orange" onclick="replaceOne(\'' + id + '\')">🔄 Заменить тему</button>';
    }
  }
}

// ── Изменение порядка тем ──

async function moveCard(id, direction) {
  var idx = -1;
  for (var i = 0; i < items.length; i++) {
    if (items[i].id === id) { idx = i; break; }
  }
  if (idx === -1) return;

  var newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= items.length) return;

  // Меняем местами в массиве
  var tmp = items[idx];
  items[idx] = items[newIdx];
  items[newIdx] = tmp;

  // Назначаем sort_order по позиции
  var updates = [];
  for (var j = 0; j < items.length; j++) {
    updates.push({ id: items[j].id, sort_order: j + 1 });
  }

  // Визуально перемещаем враппер
  var list = document.getElementById('items-list');
  var wrapA = document.getElementById('wrap-' + id);
  var wrapB = document.getElementById('wrap-' + items[idx].id);
  if (wrapA && wrapB) {
    if (direction < 0) {
      list.insertBefore(wrapA, wrapB);
    } else {
      list.insertBefore(wrapB, wrapA);
    }
  }

  // Сохраняем в базу
  var res = await adminAction('reorder', null, { updates: updates });
  if (!res || !res.ok) {
    showAlert('Ошибка сохранения порядка', '⚠️');
    setTimeout(loadCurrentTab, 300);
  }
}

// ── Добавить тему ──

function showAddTopicModal() {
  document.getElementById('at-headline').value = '';
  document.getElementById('at-summary').value = '';
  document.getElementById('at-tag').value = 'мир';
  ['west','ukraine','russia','china'].forEach(function(p) {
    ['name','title','url','comment'].forEach(function(f) {
      var el = document.getElementById('at-' + p + '-' + f);
      if (el) el.value = '';
    });
  });
  document.querySelectorAll('#modal-add-topic details').forEach(function(d) { d.removeAttribute('open'); });
  openModal('modal-add-topic');
}

async function submitAddTopic() {
  var headline = document.getElementById('at-headline').value.trim();
  var summary = document.getElementById('at-summary').value.trim();
  if (!headline || !summary) {
    showAlert('Заполните заголовок и описание темы.', '⚠️');
    return;
  }

  var btn = document.getElementById('at-save-btn');
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  var payload = {
    action: 'add_topic',
    password: adminPassword,
    headline: headline,
    summary: summary,
    topic_tag: document.getElementById('at-tag').value,
    date: currentDate
  };

  ['west','ukraine','russia','china'].forEach(function(p) {
    payload['src_name_' + p] = document.getElementById('at-' + p + '-name').value.trim();
    payload['src_title_' + p] = document.getElementById('at-' + p + '-title').value.trim();
    payload['src_url_' + p] = document.getElementById('at-' + p + '-url').value.trim();
    payload['src_comment_' + p] = document.getElementById('at-' + p + '-comment').value.trim();
  });

  try {
    var r = await fetch('/api/news-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    var result = await r.json();
    if (result && result.ok) {
      closeModal('modal-add-topic');
      showAlert('Тема опубликована ✓', '✅');
      setTimeout(loadCurrentTab, 500);
    } else {
      showAlert((result && result.error) || 'Ошибка сохранения', '⚠️');
    }
  } catch (e) {
    showAlert('Ошибка: ' + e.message, '⚠️');
  }

  btn.disabled = false;
  btn.textContent = 'Опубликовать тему';
}

// ── Добавить ссылку к теме ──

function showAddSourceModal(newsId) {
  document.getElementById('as-news-id').value = newsId;
  ['name','title','url','comment'].forEach(function(f) {
    document.getElementById('as-' + f).value = '';
  });
  document.getElementById('as-perspective').value = 'west';
  openModal('modal-add-source');
}

async function submitAddSource() {
  var newsId = document.getElementById('as-news-id').value;
  var title = document.getElementById('as-title').value.trim();
  var url = document.getElementById('as-url').value.trim();
  if (!title || !url) {
    showAlert('Заполните заголовок и ссылку.', '⚠️');
    return;
  }

  var btn = document.getElementById('as-save-btn');
  btn.disabled = true;
  btn.textContent = 'Добавляем...';

  try {
    var r = await fetch('/api/news-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'add_source',
        password: adminPassword,
        id: newsId,
        perspective: document.getElementById('as-perspective').value,
        src_name: document.getElementById('as-name').value.trim(),
        src_title: title,
        src_url: url,
        src_comment: document.getElementById('as-comment').value.trim()
      })
    });
    var result = await r.json();
    if (result && result.ok) {
      closeModal('modal-add-source');
      showAlert('Ссылка добавлена ✓', '✅');
      setTimeout(loadCurrentTab, 500);
    } else {
      showAlert((result && result.error) || 'Ошибка добавления', '⚠️');
    }
  } catch (e) {
    showAlert('Ошибка: ' + e.message, '⚠️');
  }

  btn.disabled = false;
  btn.textContent = 'Добавить';
}
