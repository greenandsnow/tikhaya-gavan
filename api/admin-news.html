<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Модерация новостей — Тихая гавань</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #f5f0e8; --sand-dark: #e8e0d0; --sea: #4a7c8e; --sea-pale: #d6e8ed;
      --white: #fdfcfa; --text: #3a3530; --text-light: #6b6560; --ink: #2a2520;
      --green: #3a8a5c; --red: #b84040; --stone: #8a8278;
    }
    body { font-family: 'Jost', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }

    h1 { font-size: 1.5rem; color: var(--ink); margin-bottom: .5rem; }
    .subtitle { font-size: .85rem; color: var(--stone); margin-bottom: 2rem; }

    /* Login */
    .login-box {
      background: var(--white); border: 1px solid var(--sand-dark); border-radius: 10px;
      padding: 2rem; max-width: 360px; margin: 4rem auto;
    }
    .login-box h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--ink); }
    .login-box input {
      width: 100%; padding: .6rem .8rem; border: 1.5px solid var(--sand-dark); border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .9rem; margin-bottom: 1rem;
    }
    .login-box button {
      width: 100%; padding: .6rem; background: var(--sea); color: white; border: none;
      border-radius: 6px; font-family: 'Jost', sans-serif; font-size: .9rem; font-weight: 500;
      cursor: pointer;
    }
    .login-box button:hover { opacity: .9; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;
    }
    .toolbar input[type="date"] {
      padding: .4rem .6rem; border: 1.5px solid var(--sand-dark); border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .85rem;
    }
    .btn {
      padding: .45rem .9rem; border: none; border-radius: 6px;
      font-family: 'Jost', sans-serif; font-size: .8rem; font-weight: 500;
      cursor: pointer; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-green { background: var(--green); color: white; }
    .btn-sea { background: var(--sea); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-outline { background: transparent; border: 1.5px solid var(--sand-dark); color: var(--text-light); }

    .stats { font-size: .8rem; color: var(--stone); }

    /* Card */
    .draft-card {
      background: var(--white); border: 1px solid var(--sand-dark); border-radius: 10px;
      padding: 1.25rem; margin-bottom: 1rem;
    }
    .draft-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
      margin-bottom: .75rem;
    }
    .draft-headline { font-size: 1.05rem; font-weight: 600; color: var(--ink); line-height: 1.3; }
    .draft-tag {
      padding: .12rem .5rem; border-radius: 10px; font-size: .65rem; font-weight: 500;
      background: var(--sea-pale); color: var(--sea); text-transform: uppercase; white-space: nowrap;
    }
    .draft-summary { font-size: .82rem; color: var(--text-light); line-height: 1.7; margin-bottom: .75rem; }

    .draft-sources { margin-bottom: .75rem; }
    .draft-src {
      display: flex; align-items: flex-start; gap: .5rem;
      padding: .5rem 0; border-bottom: 1px solid var(--sand-dark);
      font-size: .8rem;
    }
    .draft-src:last-child { border-bottom: none; }
    .draft-src-flag { font-size: .9rem; flex-shrink: 0; width: 24px; text-align: center; }
    .draft-src-info { flex: 1; }
    .draft-src-name { font-weight: 600; color: var(--text); }
    .draft-src-title { color: var(--text-light); margin-top: .15rem; }
    .draft-src-excerpt { color: var(--stone); font-size: .75rem; margin-top: .25rem; line-height: 1.5; }
    .draft-src-url { font-size: .72rem; color: var(--sea); word-break: break-all; }

    .draft-actions {
      display: flex; gap: .5rem; padding-top: .75rem;
      border-top: 1px solid var(--sand-dark);
    }

    .empty-msg { text-align: center; padding: 3rem; color: var(--stone); }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem; padding: .6rem 1.2rem;
      background: var(--ink); color: white; border-radius: 8px; font-size: .85rem;
      display: none; z-index: 999; animation: fadeUp .3s ease;
    }
    .toast.show { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="container">
  <!-- LOGIN -->
  <div id="login-screen" class="login-box">
    <h2>🔐 Модерация новостей</h2>
    <input type="password" id="pwd-input" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Войти</button>
  </div>

  <!-- ADMIN -->
  <div id="admin-screen" style="display:none">
    <h1>📰 Модерация новостей</h1>
    <div class="subtitle">Черновики собраны в 00:00 UTC. Проверьте и опубликуйте.</div>

    <div class="toolbar">
      <div style="display:flex;gap:.5rem;align-items:center">
        <input type="date" id="date-picker" onchange="loadDrafts()" />
        <button class="btn btn-sea" onclick="loadDrafts()">Загрузить</button>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <span class="stats" id="stats-text"></span>
        <button class="btn btn-green" onclick="publishAll()">✓ Опубликовать все</button>
      </div>
    </div>

    <div id="drafts-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var adminPassword = '';
var currentDate = new Date().toISOString().split('T')[0];
var drafts = [];

var FLAGS = { west: '🌍', ukraine: '🇺🇦', russia: '🇷🇺', china: '🇨🇳' };
var LABELS = { west: 'Запад', ukraine: 'Украина', russia: 'Россия', china: 'Китай' };

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function doLogin() {
  adminPassword = document.getElementById('pwd-input').value;
  if (!adminPassword) return;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  document.getElementById('date-picker').value = currentDate;
  loadDrafts();
}

async function loadDrafts() {
  currentDate = document.getElementById('date-picker').value || currentDate;
  var list = document.getElementById('drafts-list');
  list.innerHTML = '<div class="empty-msg">Загружаем...</div>';

  try {
    var r = await fetch('/api/news?date=' + currentDate + '&status=draft');
    var data = await r.json();
    drafts = Array.isArray(data) ? data : [];
  } catch (e) {
    drafts = [];
  }

  document.getElementById('stats-text').textContent = 'Черновиков: ' + drafts.length;

  if (drafts.length === 0) {
    list.innerHTML = '<div class="empty-msg">Нет черновиков за эту дату</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < drafts.length; i++) {
    var n = drafts[i];
    var srcHtml = '';
    var order = ['west', 'ukraine', 'russia', 'china'];
    for (var k = 0; k < order.length; k++) {
      for (var j = 0; j < (n.sources || []).length; j++) {
        var s = n.sources[j];
        if (s.perspective === order[k]) {
          srcHtml +=
            '<div class="draft-src">' +
              '<div class="draft-src-flag">' + (FLAGS[s.perspective] || '📰') + '</div>' +
              '<div class="draft-src-info">' +
                '<div class="draft-src-name">' + esc(s.name) + ' <span style="color:var(--stone);font-weight:400">(' + (LABELS[s.perspective] || '') + ')</span></div>' +
                '<div class="draft-src-title">' + esc(s.title) + '</div>' +
                (s.excerpt ? '<div class="draft-src-excerpt">' + esc(s.excerpt).substring(0, 200) + '...</div>' : '') +
                '<div class="draft-src-url"><a href="' + esc(s.url) + '" target="_blank">' + esc(s.url).substring(0, 70) + '...</a></div>' +
              '</div>' +
            '</div>';
          break;
        }
      }
    }

    html +=
      '<div class="draft-card" id="card-' + n.id + '">' +
        '<div class="draft-header">' +
          '<div class="draft-headline">' + esc(n.headline) + '</div>' +
          '<span class="draft-tag">' + esc(n.topic_tag) + '</span>' +
        '</div>' +
        '<div class="draft-summary">' + esc(n.summary) + '</div>' +
        '<div class="draft-sources">' + srcHtml + '</div>' +
        '<div class="draft-actions">' +
          '<button class="btn btn-green" onclick="publishOne(\'' + n.id + '\')">✓ Опубликовать</button>' +
          '<button class="btn btn-red" onclick="deleteOne(\'' + n.id + '\')">✕ Удалить</button>' +
        '</div>' +
      '</div>';
  }
  list.innerHTML = html;
}

async function adminAction(action, id) {
  try {
    var body = { action: action, password: adminPassword };
    if (id) body.id = id;
    if (action === 'publish_all') body.date = currentDate;

    var r = await fetch('/api/news-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var data = await r.json();
    return data;
  } catch (e) {
    toast('Ошибка: ' + e.message);
    return null;
  }
}

async function publishOne(id) {
  var res = await adminAction('publish', id);
  if (res && res.ok) {
    document.getElementById('card-' + id).style.opacity = '0.3';
    toast('Опубликовано ✓');
  } else {
    toast('Ошибка публикации');
  }
}

async function deleteOne(id) {
  if (!confirm('Удалить эту тему?')) return;
  var res = await adminAction('delete', id);
  if (res && res.ok) {
    document.getElementById('card-' + id).remove();
    toast('Удалено');
  }
}

async function publishAll() {
  if (!confirm('Опубликовать все черновики за ' + currentDate + '?')) return;
  var res = await adminAction('publish_all');
  if (res && res.ok) {
    toast('Все опубликованы ✓');
    setTimeout(loadDrafts, 500);
  }
}
</script>
</body>
</html>
